<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tajmeel · Guest Attendance</title>
<style>
  :root {
    --bg: #140f0a;
    --bg2: #1e1510;
    --bg3: #2a1c12;
    --card: #231810;
    --gold: #c4a87a;
    --gold2: #a88a5a;
    --gold3: #7a6040;
    --cream: #ead8bf;
    --red: #8a2535;
    --border: rgba(196,168,122,0.15);
    --border2: rgba(196,168,122,0.08);
    --green: #2d7a4a;
    --green-light: #3a9e60;
    --text-muted: #6a5540;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, 'Helvetica Neue', sans-serif; color: var(--cream); }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left h1 { font-size: 22px; font-weight: 300; letter-spacing: 1px; color: var(--cream); }
  .header-left span { font-size: 10px; letter-spacing: 3px; color: var(--gold3); text-transform: uppercase; }
  .header-stats { display: flex; gap: 16px; align-items: center; }
  .stat-box { text-align: center; }
  .stat-box .num { font-size: 22px; font-weight: 600; color: var(--gold); line-height: 1; }
  .stat-box .lbl { font-size: 9px; letter-spacing: 2px; color: var(--gold3); text-transform: uppercase; }
  .stat-divider { width: 1px; height: 30px; background: var(--border); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .add-btn {
    background: var(--red); color: white; border: none; border-radius: 10px;
    padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px; letter-spacing: 0.3px;
  }
  .add-btn:active { opacity: 0.8; }
  .report-btn {
    background: var(--bg3); color: var(--gold); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 6px; letter-spacing: 0.3px;
  }
  .report-btn:active { opacity: 0.8; }

  /* ── REPORT MODAL ── */
  .report-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 300;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .report-overlay.show { display: flex; }
  .report-box {
    background: #fff; border-radius: 16px;
    width: 100%; max-width: 720px; max-height: 88vh;
    overflow-y: auto; padding: 36px 32px;
    color: #1a1208;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }
  .report-box .r-logo { font-size: 26px; font-weight: 300; letter-spacing: 2px; color: #1a1208; margin-bottom: 2px; }
  .report-box .r-sub { font-size: 10px; letter-spacing: 4px; color: #9a7a4a; text-transform: uppercase; margin-bottom: 4px; }
  .report-box .r-date { font-size: 11px; color: #9a7a4a; margin-bottom: 24px; }
  .report-box hr { border: none; border-top: 1px solid #e8e0d0; margin: 18px 0; }
  .r-stats { display: flex; gap: 0; border: 1px solid #e8e0d0; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .r-stat { flex: 1; padding: 16px; text-align: center; border-right: 1px solid #e8e0d0; }
  .r-stat:last-child { border-right: none; }
  .r-stat .r-num { font-size: 32px; font-weight: 700; color: #8a2535; line-height: 1; }
  .r-stat .r-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #9a7a4a; margin-top: 4px; }
  .r-section-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #9a7a4a;
    margin: 20px 0 10px;
  }
  .r-seg-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .r-seg-name { font-size: 13px; font-weight: 500; color: #1a1208; width: 200px; flex-shrink: 0; }
  .r-bar-wrap { flex: 1; background: #f0ebe0; border-radius: 4px; height: 8px; overflow: hidden; }
  .r-bar-fill { height: 100%; border-radius: 4px; background: #8a2535; }
  .r-seg-count { font-size: 12px; color: #6a5040; width: 60px; text-align: right; flex-shrink: 0; }
  .r-guest-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .r-guest-table th { text-align: left; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #9a7a4a; padding: 6px 8px; border-bottom: 1px solid #e8e0d0; }
  .r-guest-table td { padding: 7px 8px; border-bottom: 1px solid #f0ebe0; vertical-align: top; }
  .r-guest-table tr:last-child td { border-bottom: none; }
  .r-status-in { display: inline-block; background: #d4edda; color: #1a6a35; border-radius: 4px; padding: 1px 8px; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .r-status-out { display: inline-block; background: #f8e8e0; color: #8a2535; border-radius: 4px; padding: 1px 8px; font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .report-actions { display: flex; gap: 10px; margin-bottom: 24px; }
  .r-print-btn { flex: 1; padding: 14px; background: #1a1208; color: #e8d8b0; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .r-close-btn { padding: 14px 20px; background: transparent; color: #9a7a4a; border: 1px solid #e0d8c8; border-radius: 10px; font-size: 15px; cursor: pointer; }
  .r-noshow-highlight { background: #fff8f5; }

  @media print {
    .report-overlay { position: static; background: white; padding: 0; }
    .report-box { max-height: none; box-shadow: none; border-radius: 0; }
    .report-actions { display: none; }
  }

  /* ── SEARCH ── */
  .search-bar {
    padding: 10px 20px 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
  }
  .search-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px 10px 40px; font-size: 15px;
    color: var(--cream); outline: none; position: relative;
  }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gold3); font-size: 16px; pointer-events: none; }
  .search-input::placeholder { color: var(--gold3); }

  /* ── SEGMENT TABS ── */
  .tabs-wrap {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px 0;
    overflow-x: auto;
    display: flex;
    gap: 6px;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 8px 8px 0 0;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 7px;
  }
  .tab .tab-count {
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    min-width: 22px;
    text-align: center;
  }
  .tab.active { background: var(--bg); border-color: var(--border); color: var(--gold); }
  .tab.active .tab-count { background: var(--gold); color: #000; }
  .tab:not(.active) { color: var(--gold3); background: transparent; }
  .tab:not(.active):active { background: var(--bg3); }

  /* ── GUEST LIST ── */
  .list-area {
    overflow-y: auto;
    height: calc(100vh - 195px);
    padding: 12px 20px 30px;
  }
  .segment-header {
    display: flex; align-items: center; gap: 12px;
    margin: 18px 0 10px;
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold3);
  }
  .segment-header:first-child { margin-top: 4px; }
  .segment-line { flex: 1; height: 1px; background: var(--border2); }
  .segment-badge {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 5px; padding: 2px 8px;
    font-size: 9px; letter-spacing: 2px; color: var(--gold3);
  }

  .guest-card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .guest-card.checked-in {
    background: rgba(45,122,74,0.12);
    border-color: rgba(58,158,96,0.35);
  }
  .guest-card:active { opacity: 0.85; }

  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .avatar-c1 { background: rgba(138,37,53,0.25); color: #e8a0a8; }
  .avatar-c2 { background: rgba(138,90,30,0.25); color: #e8c080; }
  .avatar-c3 { background: rgba(80,60,30,0.3); color: #c4a870; }
  .avatar-c4 { background: rgba(40,70,100,0.3); color: #80b0d0; }
  .avatar-walk { background: rgba(70,50,120,0.3); color: #a080d0; }

  .guest-info { flex: 1; min-width: 0; }
  .guest-name {
    font-size: 15px; font-weight: 500; color: var(--cream);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .guest-role {
    font-size: 11px; color: var(--gold3); margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .guest-desc {
    font-size: 11px; color: #8a7060; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .guest-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
  .importance { font-size: 11px; }
  .circle-tag {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 7px; border-radius: 4px; border: 1px solid;
  }
  .tag-c1 { color: #e8a0a8; border-color: rgba(232,160,168,0.25); background: rgba(138,37,53,0.12); }
  .tag-c2 { color: #e8c080; border-color: rgba(232,192,128,0.25); background: rgba(138,90,30,0.12); }
  .tag-c3 { color: var(--gold); border-color: rgba(196,168,122,0.25); background: rgba(196,168,122,0.08); }
  .tag-c4 { color: #80b0d0; border-color: rgba(128,176,208,0.25); background: rgba(40,70,100,0.12); }
  .tag-walk { color: #a080d0; border-color: rgba(160,128,208,0.25); background: rgba(70,50,120,0.12); }

  .checkin-btn {
    flex-shrink: 0;
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }
  .checkin-btn.done {
    background: var(--green);
    border-color: var(--green-light);
  }
  .checkin-btn:active { transform: scale(0.9); }

  /* ── ADD GUEST MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 90%; max-width: 480px;
  }
  .modal h2 { font-size: 18px; font-weight: 400; color: var(--cream); margin-bottom: 6px; }
  .modal p { font-size: 12px; color: var(--gold3); margin-bottom: 20px; letter-spacing: 0.5px; }
  .form-field { margin-bottom: 14px; }
  .form-field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold3); margin-bottom: 6px; }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; font-size: 15px;
    color: var(--cream); outline: none; font-family: inherit;
  }
  .form-field textarea { height: 70px; resize: none; }
  .form-field select { appearance: none; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 13px; border: 1px solid var(--border);
    background: transparent; color: var(--gold3); border-radius: 10px;
    font-size: 15px; cursor: pointer;
  }
  .btn-save {
    flex: 2; padding: 13px; border: none;
    background: var(--red); color: white; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-save:active, .btn-cancel:active { opacity: 0.8; }

  /* ── DETAIL SHEET ── */
  .detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 150;
    align-items: flex-end; justify-content: center;
  }
  .detail-overlay.show { display: flex; }
  .detail-sheet {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 24px;
    width: 100%;
    max-width: 768px;
  }
  .detail-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .detail-avatar {
    width: 70px; height: 70px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 600; margin-bottom: 14px;
  }
  .detail-name { font-size: 22px; font-weight: 400; color: var(--cream); margin-bottom: 4px; }
  .detail-role { font-size: 13px; color: var(--gold); margin-bottom: 12px; }
  .detail-desc { font-size: 14px; color: #a09080; line-height: 1.6; margin-bottom: 16px; }
  .detail-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .detail-chip {
    padding: 6px 14px; border-radius: 20px; border: 1px solid;
    font-size: 11px; letter-spacing: 1px;
  }
  .detail-checkin {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px;
  }
  .detail-checkin.not-in { background: var(--green); color: white; }
  .detail-checkin.is-in { background: var(--bg3); color: var(--gold3); border: 1px solid var(--border); }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--gold3); }
  .empty .e-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── TBC badge ── */
  .tbc-badge { background: rgba(180,120,0,0.2); color: #c8a030; border: 1px solid rgba(200,160,48,0.3); border-radius: 4px; padding: 1px 6px; font-size: 9px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>tajmeel <span style="font-size:11px;color:var(--gold3);letter-spacing:2px;">CLINIC</span></h1>
    <div><span>Launch · April 1, 2026</span></div>
  </div>
  <div class="header-stats">
    <div class="stat-box"><div class="num" id="stat-checked">0</div><div class="lbl">Arrived</div></div>
    <div class="stat-divider"></div>
    <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">Invited</div></div>
    <div class="stat-divider"></div>
    <div class="stat-box"><div class="num" id="stat-pct">0%</div><div class="lbl">Turnout</div></div>
  </div>
  <div class="header-actions">
    <button class="report-btn" onclick="openReport()">📋 Report</button>
    <button class="add-btn" onclick="openAddModal()">＋ Walk-in</button>
  </div>
</div>

<div class="search-bar">
  <div class="search-wrap" style="padding-bottom:10px;">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="Search guest name…" oninput="renderList()">
  </div>
</div>

<div class="tabs-wrap" id="tabs"></div>

<div class="list-area" id="list"></div>

<!-- REPORT MODAL -->
<div class="report-overlay" id="reportOverlay">
  <div class="report-box" id="reportContent">
    <!-- generated by openReport() -->
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Add Walk-in Guest</h2>
    <p>Guest not on the list? Add them manually.</p>
    <div class="form-field">
      <label>Full Name</label>
      <input type="text" id="wName" placeholder="Name">
    </div>
    <div class="form-field">
      <label>Role / Title</label>
      <input type="text" id="wRole" placeholder="e.g. Influencer, Media, VIP">
    </div>
    <div class="form-field">
      <label>Segment</label>
      <select id="wSegment">
        <option value="c1">Circle 01 – Royalty & Govt</option>
        <option value="c2">Circle 02 – Celebrities & Paid</option>
        <option value="c3" selected>Circle 03/04 – Influencers/VIPs</option>
        <option value="c4">Circle 05 – Media / PR</option>
      </select>
    </div>
    <div class="form-field">
      <label>Notes (optional)</label>
      <textarea id="wNotes" placeholder="Any additional notes…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" onclick="saveWalkIn()">Add & Check In ✓</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detailSheet">
    <div class="detail-handle"></div>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">
      <div class="detail-avatar" id="dAvatar"></div>
      <div>
        <div class="detail-name" id="dName"></div>
        <div class="detail-role" id="dRole"></div>
      </div>
    </div>
    <div class="detail-row" id="dChips"></div>
    <div class="detail-desc" id="dDesc"></div>
    <button class="detail-checkin" id="dCheckinBtn" onclick="toggleFromDetail()"></button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// GUEST DATA
// ══════════════════════════════════════════════════════════
const SEGMENTS = {
  c1: { label: "Circle 01", full: "Royalty & Senior Govt.", color: "c1", tabColor: "#8a2535" },
  c2: { label: "Circle 02/03", full: "Celebrities & Paid Collaborators", color: "c2", tabColor: "#8b4a1e" },
  c3: { label: "Circle 04", full: "Guest Influencers & VIPs", color: "c3", tabColor: "#7a6030" },
  c4: { label: "Circle 05", full: "Media & PR", color: "c4", tabColor: "#285070" },
  walk: { label: "Walk-ins", full: "Walk-in Guests", color: "walk", tabColor: "#4a3278" },
};

let guests = [
  // ── CIRCLE 01 – Royalty & Senior Govt ──
  { id:1, seg:"c1", name:"H.E Dr. Thani bin Ahmed Al Zeyoudi", role:"Guest of Honour · Minister of Foreign Trade, UAE", imp:3, tbc:false, desc:"UAE Minister of State for Foreign Trade and one of the most influential economic voices in the Gulf. His presence as Guest of Honour is the highest prestige signal for the launch." },
  { id:2, seg:"c1", name:"H.H Sheikha Shamsa Bint Hasher Al Maktoum", role:"UAE Royal Family", imp:3, tbc:true, desc:"Member of the Al Maktoum royal family of Dubai. Her attendance would carry immense prestige and elevate Tajmeel's positioning in the highest social circles of the UAE." },
  { id:3, seg:"c1", name:"H.H. Sheikh Ahmed bin Rashid Al Maktoum", role:"Chairman & President, Al Wasl Club", imp:3, tbc:false, desc:"Prominent member of the Dubai royal family and Chairman of Al Wasl FC. Significant social and institutional influence across UAE sporting and business circles." },
  { id:4, seg:"c1", name:"H.E. Laila Rahhal El Atfani", role:"Goodwill Ambassador, UAE", imp:3, tbc:false, desc:"Goodwill Ambassador active in humanitarian and cultural diplomacy across the UAE and wider Arab world. Strong ties to government and civil society networks." },
  { id:5, seg:"c1", name:"HE Dr Hind Alhajri", role:"Sharjah Advisory Council", imp:3, tbc:false, desc:"Senior advisory figure connected to Sharjah's leadership. A respected voice in policy and women's empowerment circles across the Northern Emirates." },
  { id:6, seg:"c1", name:"H.E. Turki bin Abdullah Al Dakhil", role:"Ambassador of Saudi Arabia to UAE", imp:3, tbc:false, desc:"Saudi Arabia's top diplomatic representative in the UAE. Attendance connects Tajmeel to the vast Saudi high-net-worth and royal network." },
  { id:7, seg:"c1", name:"H.E. Saeed bin Ali Al Hajri", role:"Consul General of Qatar in Dubai", imp:3, tbc:false, desc:"Qatar's senior diplomatic presence in Dubai. Key contact for GCC diplomatic and business networks with strong ties to Qatari elites." },
  { id:8, seg:"c1", name:"Excellency Issam Kazim", role:"CEO, Dubai Tourism & Commerce Marketing", imp:3, tbc:false, desc:"Heads Dubai's global tourism and commerce marketing authority. His attendance directly connects Tajmeel to Dubai's official branding and tourism machine." },

// ── STATE ──
let activeTab = "all";
let detailGuest = null;

function getInitials(name) {
  return name.replace(/^H\.H\.|^H\.E\.|^Dr\.|^Mr\.|^Mrs\.|^Ms\.|^Eng\./, '').trim()
    .split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function impStars(n) { return '★'.repeat(n) + '☆'.repeat(3-n); }
function avatarClass(seg) { return 'avatar-' + (seg==='walk'?'walk':seg); }
function tagClass(seg) { return 'tag-' + (seg==='walk'?'walk':seg); }
function circleLabel(seg) {
  const s = SEGMENTS[seg]; return s ? s.label : 'Walk-in';
}

function segCounts() {
  const counts = { all: guests.length };
  Object.keys(SEGMENTS).forEach(k => counts[k] = guests.filter(g=>g.seg===k).length);
  return counts;
}

function buildTabs() {
  const counts = segCounts();
  const tabEl = document.getElementById('tabs');
  const tabs = [
    { key:'all', label:'All Guests' },
    { key:'c1', label:'Royalty & Govt' },
    { key:'c2', label:'Celebrities' },
    { key:'c3', label:'Influencers & VIPs' },
    { key:'c4', label:'Media & PR' },
  ];
  if (counts.walk > 0) tabs.push({ key:'walk', label:'Walk-ins' });

  tabEl.innerHTML = tabs.map(t => `
    <div class="tab ${activeTab===t.key?'active':''}" onclick="setTab('${t.key}')">
      ${t.label}
      <span class="tab-count">${counts[t.key]||0}</span>
    </div>`).join('');
}

function setTab(k) { activeTab=k; buildTabs(); renderList(); }

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = guests.filter(g => {
    const matchSeg = activeTab==='all' || g.seg===activeTab;
    const matchQ = !q || g.name.toLowerCase().includes(q) || g.role.toLowerCase().includes(q);
    return matchSeg && matchQ;
  });

  updateStats();
  const listEl = document.getElementById('list');
  if (!filtered.length) {
    listEl.innerHTML = `<div class="empty"><div class="e-icon">🔍</div><p>No guests found</p></div>`;
    return;
  }

  // Group by segment
  let html = '';
  if (activeTab === 'all' && !q) {
    Object.entries(SEGMENTS).forEach(([segKey, segInfo]) => {
      const segGuests = filtered.filter(g=>g.seg===segKey);
      if (!segGuests.length) return;
      const checkedIn = segGuests.filter(g=>g.checked).length;
      html += `<div class="segment-header">
        <span class="segment-badge">${segInfo.label}</span>
        <span style="font-size:10px;color:var(--gold3);">${segInfo.full}</span>
        <div class="segment-line"></div>
        <span style="color:var(--gold3);font-size:10px;">${checkedIn}/${segGuests.length}</span>
      </div>`;
      segGuests.forEach(g => { html += guestCard(g); });
    });
  } else {
    filtered.forEach(g => { html += guestCard(g); });
  }

  listEl.innerHTML = html;
}

function guestCard(g) {
  const initials = getInitials(g.name);
  return `<div class="guest-card ${g.checked?'checked-in':''}" onclick="openDetail(${g.id})">
    <div class="avatar ${avatarClass(g.seg)}">${g.checked ? '✓' : initials}</div>
    <div class="guest-info">
      <div class="guest-name">${g.name} ${g.tbc?'<span class="tbc-badge">TBC</span>':''}</div>
      <div class="guest-role">${g.role}</div>
      <div class="guest-desc">${g.desc}</div>
      <div class="guest-meta">
        <span style="color:${impColor(g.imp)};font-size:12px;">${impStars(g.imp)}</span>
        <span class="circle-tag ${tagClass(g.seg)}">${circleLabel(g.seg)}</span>
      </div>
    </div>
    <button class="checkin-btn ${g.checked?'done':''}" onclick="toggleCheckin(event,${g.id})">
      ${g.checked ? '✓' : '○'}
    </button>
  </div>`;
}

function impColor(n) {
  if (n===3) return '#e8c060';
  if (n===2) return '#c4a870';
  return '#7a6040';
}

function toggleCheckin(e, id) {
  e.stopPropagation();
  const g = guests.find(x=>x.id===id);
  if (g) g.checked = !g.checked;
  updateStats(); buildTabs(); renderList();
}

function updateStats() {
  const checked = guests.filter(g=>g.checked).length;
  const total = guests.length;
  document.getElementById('stat-checked').textContent = checked;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pct').textContent = total ? Math.round(checked/total*100)+'%' : '0%';
}

function openDetail(id) {
  const g = guests.find(x=>x.id===id);
  if (!g) return;
  detailGuest = g;
  document.getElementById('dAvatar').className = `detail-avatar ${avatarClass(g.seg)}`;
  document.getElementById('dAvatar').textContent = getInitials(g.name);
  document.getElementById('dName').textContent = g.name + (g.tbc?' (TBC)':'');
  document.getElementById('dRole').textContent = g.role;
  document.getElementById('dDesc').textContent = g.desc;
  document.getElementById('dChips').innerHTML = `
    <span class="detail-chip ${tagClass(g.seg)}">${circleLabel(g.seg)}</span>
    <span class="detail-chip" style="color:${impColor(g.imp)};border-color:${impColor(g.imp)}44;">
      ${impStars(g.imp)} Importance
    </span>`;
  updateDetailBtn(g);
  document.getElementById('detailOverlay').classList.add('show');
}

function updateDetailBtn(g) {
  const btn = document.getElementById('dCheckinBtn');
  if (g.checked) {
    btn.textContent = '✓ Checked In — Tap to Undo';
    btn.className = 'detail-checkin is-in';
  } else {
    btn.textContent = '⊙  Check In Guest';
    btn.className = 'detail-checkin not-in';
  }
}

function toggleFromDetail() {
  if (!detailGuest) return;
  detailGuest.checked = !detailGuest.checked;
  updateDetailBtn(detailGuest);
  updateStats(); buildTabs(); renderList();
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) {
    document.getElementById('detailOverlay').classList.remove('show');
    detailGuest = null;
  }
}

// ── ADD WALK-IN ──
function openAddModal() { document.getElementById('addModal').classList.add('show'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('show'); }

function saveWalkIn() {
  const name = document.getElementById('wName').value.trim();
  if (!name) { alert('Please enter a name.'); return; }
  const role = document.getElementById('wRole').value.trim() || 'Walk-in Guest';
  const seg = document.getElementById('wSegment').value;
  const notes = document.getElementById('wNotes').value.trim();
  const newId = Math.max(...guests.map(g=>g.id)) + 1;
  guests.push({
    id: newId, seg: 'walk',
    name, role, imp: 1, tbc: false,
    desc: notes || 'Walk-in guest added at the venue.',
    checked: true,
  });
  document.getElementById('wName').value = '';
  document.getElementById('wRole').value = '';
  document.getElementById('wNotes').value = '';
  closeAddModal();
  activeTab = 'walk';
  buildTabs(); renderList();
}

// ── REPORT ──
function openReport() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const timeStr = now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

  const total   = guests.length;
  const arrived = guests.filter(g=>g.checked).length;
  const noshow  = total - arrived;
  const walkins = guests.filter(g=>g.seg==='walk').length;
  const pct     = Math.round(arrived/total*100);

  // Per-segment breakdown
  const segRows = Object.entries(SEGMENTS).map(([key, s]) => {
    const sg = guests.filter(g=>g.seg===key);
    const sc = sg.filter(g=>g.checked).length;
    return { label: s.full, circle: s.label, total: sg.length, checked: sc };
  }).filter(r=>r.total>0);

  // Checked-in list
  const checkedGuests = guests.filter(g=>g.checked);
  const noshowGuests  = guests.filter(g=>!g.checked && g.seg!=='walk');

  const segBarHtml = segRows.map(r => {
    const pctBar = r.total ? Math.round(r.checked/r.total*100) : 0;
    return `<div class="r-seg-bar">
      <div class="r-seg-name">${r.circle} · ${r.label.split(' ').slice(0,3).join(' ')}</div>
      <div class="r-bar-wrap"><div class="r-bar-fill" style="width:${pctBar}%"></div></div>
      <div class="r-seg-count">${r.checked} / ${r.total}</div>
    </div>`;
  }).join('');

  const guestRows = (list, showSeg) => list.map(g => `
    <tr class="${!g.checked && g.seg!=='walk' ? 'r-noshow-highlight':''}">
      <td>${g.name}</td>
      <td style="color:#6a5040;">${g.role}</td>
      ${showSeg ? `<td style="color:#9a7a4a;font-size:11px;">${circleLabel(g.seg)}</td>` : ''}
      <td>${g.checked ? '<span class="r-status-in">ARRIVED</span>' : '<span class="r-status-out">NO SHOW</span>'}</td>
    </tr>`).join('');

  const html = `
    <div class="r-logo">tajmeel</div>
    <div class="r-sub">Clinic · Launch Event</div>
    <div class="r-date">Attendance Report · ${dateStr} · Generated ${timeStr}</div>

    <div class="report-actions">
      <button class="r-print-btn" onclick="window.print()">🖨 Print / Save as PDF</button>
      <button class="r-close-btn" onclick="closeReport()">Close</button>
    </div>

    <div class="r-stats">
      <div class="r-stat"><div class="r-num">${arrived}</div><div class="r-lbl">Arrived</div></div>
      <div class="r-stat"><div class="r-num">${noshow}</div><div class="r-lbl">No Show</div></div>
      <div class="r-stat"><div class="r-num">${walkins}</div><div class="r-lbl">Walk-ins</div></div>
      <div class="r-stat"><div class="r-num">${pct}%</div><div class="r-lbl">Turnout</div></div>
    </div>

    <div class="r-section-title">Attendance by Circle</div>
    ${segBarHtml}
    <hr>

    <div class="r-section-title">✅ Arrived (${checkedGuests.length})</div>
    <table class="r-guest-table">
      <thead><tr><th>Name</th><th>Role</th><th>Circle</th><th>Status</th></tr></thead>
      <tbody>${guestRows(checkedGuests, true)}</tbody>
    </table>

    ${noshowGuests.length ? `
    <hr>
    <div class="r-section-title">❌ No Show (${noshowGuests.length})</div>
    <table class="r-guest-table">
      <thead><tr><th>Name</th><th>Role</th><th>Circle</th><th>Status</th></tr></thead>
      <tbody>${guestRows(noshowGuests, true)}</tbody>
    </table>` : ''}

    ${walkins ? `
    <hr>
    <div class="r-section-title">➕ Walk-in Guests (${walkins})</div>
    <table class="r-guest-table">
      <thead><tr><th>Name</th><th>Role</th><th>Status</th></tr></thead>
      <tbody>${guestRows(guests.filter(g=>g.seg==='walk'), false)}</tbody>
    </table>` : ''}

    <hr>
    <div style="font-size:10px;color:#c0b090;text-align:center;margin-top:8px;">
      Tajmeel Clinic · Confidential · ${dateStr}
    </div>
  `;

  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('reportOverlay').classList.add('show');
}

function closeReport() {
  document.getElementById('reportOverlay').classList.remove('show');
}

// ── INIT ──
buildTabs();
renderList();
</script>
</body>
</html>
